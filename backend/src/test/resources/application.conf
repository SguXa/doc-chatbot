ktor {
    deployment {
        port = 8080
        host = "0.0.0.0"
    }
    application {
        modules = [ com.aos.chatbot.ApplicationKt.module ]
    }
}

app {
    mode = "full"
    database {
        path = ":memory:"
    }
    data {
        path = "./data"
    }
    paths {
        documents = ${app.data.path}/documents
        documents = ${?DOCUMENTS_PATH}
        images = ${app.data.path}/images
        images = ${?IMAGES_PATH}
    }
}
