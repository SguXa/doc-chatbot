ktor {
    deployment {
        port = 8080
        port = ${?PORT}
        host = "0.0.0.0"
        host = ${?HOST}
    }
    application {
        modules = [ com.aos.chatbot.ApplicationKt.module ]
    }
}

app {
    mode = "full"
    mode = ${?MODE}
    database {
        path = "./data/aos.db"
        path = ${?DATABASE_PATH}
    }
    data {
        path = "./data"
        path = ${?DATA_PATH}
    }
    paths {
        documents = ${app.data.path}/documents
        documents = ${?DOCUMENTS_PATH}
        images = ${app.data.path}/images
        images = ${?IMAGES_PATH}
    }
    ollama {
        url = "http://ollama:11434"
        url = ${?OLLAMA_URL}
        llmModel = "qwen2.5:7b-instruct-q4_K_M"
        llmModel = ${?OLLAMA_LLM_MODEL}
        embedModel = "bge-m3"
        embedModel = ${?OLLAMA_EMBED_MODEL}
    }
    artemis {
        brokerUrl = "tcp://artemis:61616"
        brokerUrl = ${?ARTEMIS_BROKER_URL}
        user = ""
        user = ${?ARTEMIS_USER}
        password = ""
        password = ${?ARTEMIS_PASSWORD}
    }
    auth {
        jwtSecret = ""
        jwtSecret = ${?JWT_SECRET}
        adminPassword = ""
        adminPassword = ${?ADMIN_PASSWORD}
    }
}
