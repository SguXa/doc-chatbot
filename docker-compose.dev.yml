services:
  backend:
    build: ./backend
    container_name: aos-backend-dev
    environment:
      - MODE=full
      - PORT=8080
      - DATABASE_PATH=/data/aos.db
    volumes:
      - aos-data:/data
      - ./backend/src:/app/src
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: aos-frontend-dev
    volumes:
      - ./frontend/src:/app/src
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  aos-data:
